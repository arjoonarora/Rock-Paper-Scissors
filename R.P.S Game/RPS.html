<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Saga - Rock Paper Scissors</title>
    <link rel="stylesheet" href="RPS.css">
</head>
<body>
    <div class="top">
        <h1 class="top-text">Stone Paper Scissors</h1>
    </div>
    
    <div class="opt">
        <div class="rock option-btn">ROCK</div>
        <div class="paper option-btn">PAPER</div>
        <div class="scissors option-btn">SCISSORS</div>
    </div>
    
    <div class="result-score">
        <div class="comp">
            <p id="comp-score" class="score-number">0</p>
            <p class="label-text">comp</p>
        </div>
        <div class="user">
            <p id="user-score" class="score-number">0</p>
            <p class="label-text">user</p>
        </div>
    </div>
    
    <div class="justBoxrole">
        <div class="message" id="result-msg">
            select any option
        </div>
    </div>
    
    <div id="domination-message" class="domination-message"></div>
</body>
<script src="RPS.js"></script>
</html>
